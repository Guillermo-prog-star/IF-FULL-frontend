<div class="wrap">
  <div class="glass-card">

    <!-- Logo -->
    <img src="assets/logo.svg" alt="Integrity Family" class="register-logo" />
    <h1>Crear cuenta</h1>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn" [class.active]="mode === 'VOUCHER'" (click)="setMode('VOUCHER')">
        Unirse a familia
      </button>
      <button class="tab-btn" [class.active]="mode === 'NEW_FAMILY'" (click)="setMode('NEW_FAMILY')">
        Crear familia
      </button>
    </div>

    <form (ngSubmit)="submit()">

      <!-- [NEW_FAMILY] Nombre de familia -->
      <div *ngIf="mode === 'NEW_FAMILY'" class="form-group">
        <label>Nombre de tu Familia</label>
        <input [(ngModel)]="familyName" name="fnm" required
               placeholder="Ej: Familia García-Morales"/>
        <small class="hint">Este nombre identificará a tu núcleo familiar en la plataforma.</small>
      </div>

      <!-- Nombre completo -->
      <div class="form-group">
        <label>Nombre completo</label>
        <input [(ngModel)]="fullName" name="fn" required placeholder="Ej: María García"/>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" name="em" type="email" required placeholder="tu@familia.com"/>
      </div>

      <!-- [VOUCHER] Código de inmersión -->
      <div *ngIf="mode === 'VOUCHER'" class="form-group">
        <div class="label-row">
          <label style="margin-bottom:0">Voucher de Inmersión</label>
          <span class="badge-alfa">Fase Alfa</span>
        </div>
        <input [(ngModel)]="voucher" name="vc"
               placeholder="Ej: ALFA-XXXXXX"/>
        <small class="hint">Ingresa tu código único para activar tu acceso familiar.</small>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label>Contraseña</label>
        <input [(ngModel)]="password" name="pw" type="password" required
               minlength="8" placeholder="Mínimo 8 caracteres"/>
        <small class="hint">Usa mayúsculas, minúsculas y al menos un número.</small>
      </div>

      <!-- [NEW_FAMILY] Confirmar contraseña -->
      <div *ngIf="mode === 'NEW_FAMILY'" class="form-group">
        <label>Confirmar Contraseña</label>
        <input [(ngModel)]="confirmPassword" name="cpw" type="password" required
               placeholder="Repite tu contraseña"/>
      </div>

      <!-- [NEW_FAMILY] Ubicación -->
      <div *ngIf="mode === 'NEW_FAMILY'" class="form-group">
        <label>Municipio</label>
        <input [(ngModel)]="municipio" name="mun" required
               placeholder="Ej: Bogotá"/>
      </div>

      <div *ngIf="mode === 'NEW_FAMILY'" class="form-group">
        <label>Código de Departamento</label>
        <input [(ngModel)]="departmentCode" name="dpt" required
               placeholder="Ej: 11"/>
      </div>

      <div *ngIf="mode === 'NEW_FAMILY'" class="form-group">
        <label>Código de País</label>
        <input [(ngModel)]="countryCode" name="cty"
               placeholder="CO"/>
      </div>

      <!-- Error -->
      <div *ngIf="error" class="err-box">
        <span>⚠️</span> {{ error }}
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">
          {{ mode === 'VOUCHER' ? '✓ Activar mi acceso' : '🏠 Registrar mi Familia' }}
        </span>
        <span *ngIf="loading" class="btn-loading">
          <span class="spinner"></span> Sincronizando...
        </span>
      </button>
    </form>

    <div class="divider"></div>

    <div class="footer">
      ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a>
    </div>

  </div>
</div>
