<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="100%" height="100%">
  <!-- Background Shield (light cream matching the image) -->
  <rect x="5" y="5" width="190" height="230" rx="40" fill="#fcfbf4" stroke="#e6e4d5" stroke-width="1.5" />
  
  <!-- Outer circular frame with soft gradient -->
  <circle cx="100" cy="95" r="70" fill="none" stroke="url(#circleGrad)" stroke-width="4" opacity="0.8" />
  
  <defs>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <!-- Family Figures (Embracing Circle) -->
  <!-- Father (Blue figure on the left, curving right) -->
  <path d="M 65 65 C 65 53, 77 53, 77 65 C 77 77, 65 77, 65 65 Z" fill="#1e40af" /> <!-- Head -->
  <path d="M 52 90 C 52 75, 75 70, 78 85 C 80 95, 72 110, 85 125 C 87 127, 85 130, 80 130 C 65 130, 52 110, 52 90 Z" fill="#2563eb" /> <!-- Body -->

  <!-- Mother (Gold/Yellow-Red figure on the right, curving left) -->
  <path d="M 135 70 C 135 58, 123 58, 123 70 C 123 82, 135 82, 135 70 Z" fill="#b45309" /> <!-- Head -->
  <path d="M 148 95 C 148 80, 125 75, 122 90 C 120 100, 128 115, 115 130 C 113 132, 115 135, 120 135 C 135 135, 148 115, 148 95 Z" fill="#d97706" /> <!-- Body -->
  <!-- Mother's hair flowing back -->
  <path d="M 135 70 C 145 75, 150 90, 145 110 C 143 115, 140 110, 142 100 C 144 90, 140 80, 133 75 Z" fill="#f59e0b" />

  <!-- Child (Small blue figure in the center) -->
  <circle cx="100" cy="98" r="8" fill="#1d4ed8" /> <!-- Head -->
  <path d="M 92 114 C 92 106, 108 106, 108 114 C 108 122, 92 122, 92 114 Z" fill="#3b82f6" /> <!-- Body -->

  <!-- Connected arms/hands forming the embracing circle -->
  <path d="M 72 100 Q 100 120 128 100 Q 100 135 72 100 Z" fill="#3b82f6" opacity="0.3" />

  <!-- Typography -->
  <!-- INTEGRITY -->
  <text x="100" y="185" text-anchor="middle" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="900" fill="#0f172a" letter-spacing="1">INTEGRITY</text>
  
  <!-- - FAMILY - -->
  <text x="100" y="208" text-anchor="middle" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#334155" letter-spacing="3">— FAMILY —</text>
</svg>
