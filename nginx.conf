server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options   "nosniff"                            always;
    add_header X-XSS-Protection         "1; mode=block"                      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ── API Proxy → backend ───────────────────────────────
    location /api/ {
        proxy_pass         http://if-backend:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Connection         "";

        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Tamaño máximo de body para uploads de evidencias
        client_max_body_size 20m;
    }

    # ── Angular SPA (client-side routing) ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets con caché agresiva ──────────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloquear acceso directo a archivos sensibles ───────
    location ~ /\. {
        deny all;
        access_log off;
    }
}
